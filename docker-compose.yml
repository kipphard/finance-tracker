services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app:app@db:5432/finance}
      FERNET_KEY: ${FERNET_KEY:?set FERNET_KEY in .env (see .env.example)}
      APP_BASE_CURRENCY: ${APP_BASE_CURRENCY:-EUR}
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Host port is configurable; set API_PORT in .env if 8000 is already in use.
      - "${API_PORT:-8000}:8000"

volumes:
  pgdata:
